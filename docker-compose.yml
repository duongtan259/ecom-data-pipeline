version: '3.8'

x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    DBT_TARGET: ${DBT_TARGET:-dev}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/service-account.json
  volumes:
    - ./dags:/opt/airflow/dags
    - ./models:/opt/airflow/dbt/models
    - ./macros:/opt/airflow/dbt/macros
    - ./dbt_project.yml:/opt/airflow/dbt/dbt_project.yml
    - ./profiles.yml:/opt/airflow/dbt/profiles.yml
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ${GOOGLE_APPLICATION_CREDENTIALS}:/opt/airflow/secrets/service-account.json:ro
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create
          --username ${_AIRFLOW_WWW_USER_USERNAME:-admin}
          --password ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
      "
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    restart: "no"

volumes:
  postgres-db-volume:
